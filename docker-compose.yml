services:
  api:
    build:
      context: ./backend
    container_name: leggau-api
    env_file:
      - .env
    environment:
      NODE_ENV: development
      PORT: ${API_PORT:-3000}
      DB_HOST: ${DB_HOST:-postgres}
      DB_PORT: ${DB_PORT:-5432}
      DB_NAME: ${DB_NAME:-leggau}
      DB_USER: ${DB_USER:-leggau}
      DB_PASSWORD: ${DB_PASSWORD:-leggau_dev_password}
      DATABASE_SYNC: ${DATABASE_SYNC:-true}
      REDIS_HOST: ${REDIS_HOST:-redis}
      REDIS_PORT: ${REDIS_PORT:-6379}
      REDIS_ENABLED: ${REDIS_ENABLED:-true}
      DEV_API_BASE_URL: ${DEV_API_BASE_URL:-http://localhost:8080/api}
      PROD_API_BASE_URL: ${PROD_API_BASE_URL:-https://api.leggau.com}
      DEFAULT_PARENT_EMAIL: ${DEFAULT_PARENT_EMAIL:-parent@leggau.local}
      DEFAULT_PARENT_NAME: ${DEFAULT_PARENT_NAME:-Responsavel Demo}
      UPLOADS_ROOT: /srv/leggau/uploads
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ${UPLOADS_ROOT:-./.data/uploads}:/srv/leggau/uploads
    ports:
      - "${API_PORT:-3000}:3000"

  postgres:
    image: postgres:16-alpine
    container_name: leggau-postgres
    environment:
      POSTGRES_DB: ${DB_NAME:-leggau}
      POSTGRES_USER: ${DB_USER:-leggau}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-leggau_dev_password}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-leggau} -d ${DB_NAME:-leggau}"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  redis:
    image: redis:7-alpine
    container_name: leggau-redis
    command: ["redis-server", "--appendonly", "yes"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"

  nginx:
    image: nginx:1.27-alpine
    container_name: leggau-nginx
    depends_on:
      - api
    ports:
      - "${NGINX_HTTP_PORT:-8080}:80"
    volumes:
      - ./infra/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ${UPLOADS_ROOT:-./.data/uploads}:/srv/leggau/uploads:ro

volumes:
  postgres_data:
  redis_data:
